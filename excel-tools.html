    <script>
        const excelFiles = [
            { id: "excel1", name: "نموذج فاتورة مبيعات Excel", category: "فواتير", description: "نموذج جاهز لفاتورة مبيعات مع حسومات وضرائب - قالب احترافي من Microsoft", icon: "fas fa-file-invoice", url: "https://templates.office.com/static/Invoice-TF-Business.xlsx", size: "245 KB" },

            { id: "excel4", name: "نموذج كشف رواتب الموظفين", category: "رواتب", description: "نموذج شامل لكشف رواتب الموظفين مع استقطاعات - من Microsoft", icon: "fas fa-users", url: "https://templates.office.com/static/Payroll-Register-TF.xlsx", size: "320 KB" },

            { id: "excel6", name: "نموذج تقييم المخزون (FIFO - LIFO)", category: "مخزون", description: "تقييم المخزون بطريقة الوارد أولاً صادر أولاً", icon: "fas fa-calculator", url: "https://templates.office.com/static/Inventory-Template-TF.xlsx", size: "412 KB" },
            { id: "excel7", name: "قالب ميزانية شخصية", category: "تمويل شخصي", description: "نموذج لإدارة الإيرادات والمصروفات الشخصية - من Microsoft", icon: "fas fa-wallet", url: "https://templates.office.com/static/Personal-Budget-TF.xlsx", size: "189 KB" },
            { id: "excel8", name: "نظام إدارة العملاء (CRM) Excel", category: "CRM", description: "نظام متكامل لإدارة بيانات العملاء والمبيعات", icon: "fas fa-address-card", url: "https://www.vertex42.com/Files/download2/crm-template.xlsx", size: "980 KB" },

            { id: "excel13", name: "نظام إدارة المشاريع Excel", category: "إدارة مشاريع", description: "نظام متكامل لإدارة المشاريع والمهام - من Smartsheet", icon: "fas fa-tasks", url: "https://www.smartsheet.com/sites/default/files/Project-Tracker-Template.xlsx", size: "1.1 MB" },
            { id: "excel14", name: "نموذج قائمة التدفقات النقدية", category: "تحليل مالي", description: "نموذج لقائمة التدفقات النقدية", icon: "fas fa-chart-line", url: "https://templates.office.com/static/Cash-Flow-Statement-TF.xlsx", size: "312 KB" },
            { id: "excel15", name: "قالب تحليل التعادل (Break-Even)", category: "تحليل مالي", description: "نموذج لحساب نقطة التعادل وتحليل الربحية", icon: "fas fa-chart-line", url: "https://www.vertex42.com/Files/download2/breakeven-analysis.xlsx", size: "267 KB" },
            { id: "excel16", name: "نموذج تقييم المشاريع (NPV - IRR)", category: "تحليل مالي", description: "نموذج لحساب صافي القيمة الحالية", icon: "fas fa-chart-line", url: "https://www.vertex42.com/Files/download2/npv-irr-calculator.xlsx", size: "289 KB" },
            { id: "excel17", name: "نظام إدارة الفواتير (Invoicing)", category: "فواتير", description: "نظام متكامل لإدارة الفواتير والعملاء", icon: "fas fa-file-invoice", url: "https://www.smartsheet.com/sites/default/files/Invoice-Tracker-Template.xlsx", size: "567 KB" },
            { id: "excel18", name: "نموذج جدول الإهلاك (Sum of Years)", category: "محاسبة", description: "نموذج لحساب إهلاك الأصول بطريقة مجموع السنوات", icon: "fas fa-chart-line", url: "https://www.vertex42.com/Files/download2/depreciation-calculator-syd.xlsx", size: "234 KB" },
            { id: "excel19", name: "قالب إدارة الوقت (Time Management)", category: "إدارة وقت", description: "نموذج لتنظيم المهام وتتبع الوقت", icon: "fas fa-clock", url: "https://templates.office.com/static/Time-Management-Schedule-TF.xlsx", size: "198 KB" },
            { id: "excel20", name: "نظام محاسبي للشركات الصغيرة", category: "محاسبة", description: "نظام محاسبي متكامل للشركات الصغيرة", icon: "fas fa-building", url: "https://www.vertex42.com/Files/download2/small-business-accounting.xlsx", size: "1.5 MB" }
        ];

        let currentSearch = "";

        function getFilteredFiles() {
            let filtered = excelFiles;
            if (currentSearch) {
                filtered = excelFiles.filter(file => 
                    file.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    file.description.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    file.category.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            return filtered;
        }

        async function downloadFile(url, filename, format) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                
                if (format === 'xlsx') {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename.replace('.xlsx', '.xlsx');
                    link.click();
                    URL.revokeObjectURL(link.href);
                } 
                else if (format === 'csv') {
                    const text = await blob.text();
                    const ws = XLSX.read(text, { type: 'string' });
                    const csv = XLSX.utils.sheet_to_csv(ws.Sheets[ws.SheetNames[0]]);
                    const csvBlob = new Blob([csv], { type: 'text/csv' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(csvBlob);
                    link.download = filename.replace('.xlsx', '.csv');
                    link.click();
                    URL.revokeObjectURL(link.href);
                }
                else if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const text = await blob.text();
                    const doc = new jsPDF();
                    doc.text(text.substring(0, 5000), 10, 10);
                    doc.save(filename.replace('.xlsx', '.pdf'));
                }
                else if (format === 'html') {
                    const text = await blob.text();
                    const htmlBlob = new Blob([`<html><head><meta charset="UTF-8"></head><body><pre>${text}</pre></body></html>`], { type: 'text/html' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(htmlBlob);
                    link.download = filename.replace('.xlsx', '.html');
                    link.click();
                    URL.revokeObjectURL(link.href);
                }
            } catch (error) {
                console.error('Error downloading file:', error);
                alert('حدث خطأ في تحميل الملف. سيتم تحميل نسخة وهمية بديلة.');
                generateFallbackExcel(filename, format);
            }
        }

        function generateFallbackExcel(filename, format) {
            const data = [
                ["بيانات نموذجية لـ " + filename],
                ["العمود 1", "العمود 2", "العمود 3"],
                ["قيمة 1", "قيمة 2", "قيمة 3"]
            ];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            
            if (format === 'xlsx') {
                XLSX.writeFile(wb, filename);
            } else if (format === 'csv') {
                const csv = XLSX.utils.sheet_to_csv(ws);
                const blob = new Blob([csv], { type: 'text/csv' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename.replace('.xlsx', '.csv');
                link.click();
                URL.revokeObjectURL(link.href);
            } else {
                XLSX.writeFile(wb, filename);
            }
        }

        function displayFiles() {
            const container = document.getElementById("excelContainer");
            const filtered = getFilteredFiles();
            
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#D4AF37;">😅 لا توجد ملفات تطابق بحثك</div>`;
                return;
            }
            
            container.innerHTML = filtered.map(file => `
                <div class="excel-card">
                    <div class="excel-icon"><i class="${file.icon}"></i></div>
                    <div class="excel-info">
                        <h3 class="excel-name">${file.name}</h3>
                        <div class="excel-category"><i class="fas fa-tag"></i> ${file.category}</div>
                        <p class="excel-description">${file.description.substring(0, 80)}${file.description.length > 80 ? '...' : ''}</p>
                        <select class="format-select" id="format-${file.id}">
                            <option value="xlsx">📊 Excel (.xlsx)</option>
                            <option value="csv">📄 CSV (.csv)</option>
                            <option value="pdf">📑 PDF (.pdf)</option>
                            <option value="html">🌐 HTML (.html)</option>
                        </select>
                        <button class="download-btn" onclick="downloadFile('${file.url}', '${file.file || file.name.replace(/ /g, '_') + '.xlsx'}', document.getElementById('format-${file.id}').value)">
                            <i class="fas fa-download"></i> تحميل (${file.size})
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function setupSearch() {
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            searchBtn.addEventListener("click", () => { currentSearch = searchInput.value; displayFiles(); });
            searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") { currentSearch = searchInput.value; displayFiles(); } });
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) { userGreeting.style.display = "inline"; userGreeting.textContent = `مرحباً ${currentUser.name}`; }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    updateAuthUI();
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) toggle.addEventListener("click", () => navLinks.classList.toggle("active"));
        }

        setupSearch();
        displayFiles();
        updateAuthUI();
        setupLogout();
        setupMobileMenu();
    </script>
