    <style>
        .excel-header {
            text-align: center;
            padding: 60px 20px 30px;
            background: linear-gradient(135deg, #0A0A0A, #1A1A1A);
        }
        .excel-header h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .excel-header p { color: #CCCCCC; }
        .search-excel {
            max-width: 500px;
            margin: 30px auto;
            display: flex;
            gap: 10px;
        }
        .search-excel input {
            flex: 1;
            padding: 12px 20px;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
        }
        .search-excel button {
            background: #D4AF37;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .excel-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .excel-card {
            background: #1A1A1A;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #2A2A2A;
            cursor: pointer;
        }
        .excel-card:hover {
            transform: translateY(-5px);
            border-color: #D4AF37;
        }
        .excel-icon {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2A2A2A, #1A1A1A);
            font-size: 3rem;
            color: #D4AF37;
        }
        .excel-info {
            padding: 20px;
            text-align: center;
        }
        .excel-name {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .excel-category {
            color: #D4AF37;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }
        .excel-description {
            color: #CCCCCC;
            font-size: 0.8rem;
            margin-bottom: 15px;
            line-height: 1.5;
            height: 60px;
            overflow: hidden;
        }
        .download-btn {
            display: inline-block;
            background: #D4AF37;
            color: #0A0A0A;
            padding: 10px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
            width: 100%;
            text-align: center;
        }
        .download-btn:hover {
            background: #FFF2B2;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
        @media (max-width: 600px) {
            .whatsapp-float { width: 50px; height: 50px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

            </div>
            <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <section class="excel-header">
        <h1>قوالب <span class="gold">Excel</span> والنماذج المحاسبية</h1>
        <p>أكثر من 20 قالب Excel ونموذج محاسبي احترافي - تحميل مباشر</p>

    <div class="excel-container" id="excelContainer"></div>

    <a href="https://wa.me/201069302075" class="whatsapp-float" target="_blank">

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Ramzone - جميع الحقوق محفوظة</p>
            <div class="social-icons">
                <a href="https://linkedin.com/in/ramadanm200110" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://twitter.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com/ra_mah077" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://facebook.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-facebook-f"></i></a>

                <a href="terms.html#privacy">سياسة الخصوصية</a>

    <script>
        const excelFiles = [
            { id: "excel1", name: "نموذج فاتورة مبيعات Excel", category: "فواتير", description: "نموذج جاهز لفاتورة مبيعات مع حسومات وضرائب", icon: "fas fa-file-invoice", file: "فاتورة_مبيعات.xlsx", size: "245 KB" },
            { id: "excel2", name: "نظام محاسبي متكامل Excel", category: "محاسبة", description: "نظام محاسبي كامل يشمل أستاذ عام وميزانية", icon: "fas fa-chart-line", file: "نظام_محاسبي_متكامل.xlsx", size: "1.2 MB" },
            { id: "excel3", name: "جدول إدارة المشتريات والمخزون", category: "مخزون", description: "نظام لإدارة المشتريات والمخزون مع تقارير", icon: "fas fa-boxes", file: "ادارة_المشتريات_والمخزون.xlsx", size: "856 KB" },
            { id: "excel4", name: "نموذج كشف رواتب الموظفين", category: "رواتب", description: "نموذج شامل لكشف رواتب الموظفين مع استقطاعات", icon: "fas fa-users", file: "كشف_رواتب_الموظفين.xlsx", size: "320 KB" },
            { id: "excel5", name: "قالب تحليل مالي (نسب مالية)", category: "تحليل مالي", description: "قالب لتحليل القوائم المالية وحساب النسب", icon: "fas fa-chart-pie", file: "تحليل_مالي_نسب_مالية.xlsx", size: "567 KB" },
            { id: "excel6", name: "نموذج تقييم المخزون (FIFO - LIFO)", category: "مخزون", description: "تقييم المخزون بطريقة الوارد أولاً صادر أولاً", icon: "fas fa-calculator", file: "تقييم_المخزون_FIFO_LIFO.xlsx", size: "412 KB" },
            { id: "excel7", name: "قالب ميزانية شخصية", category: "تمويل شخصي", description: "نموذج لإدارة الإيرادات والمصروفات الشخصية", icon: "fas fa-wallet", file: "ميزانية_شخصية.xlsx", size: "189 KB" },
            { id: "excel8", name: "نظام إدارة العملاء (CRM) Excel", category: "CRM", description: "نظام متكامل لإدارة بيانات العملاء والمبيعات", icon: "fas fa-address-card", file: "CRM_Excel.xlsx", size: "980 KB" },
            { id: "excel9", name: "نموذج جدول استهلاك الأصول الثابتة", category: "محاسبة", description: "نموذج لحساب استهلاك الأصول الثابتة", icon: "fas fa-building", file: "استهلاك_الاصول_الثابتة.xlsx", size: "278 KB" },
            { id: "excel10", name: "قالب تسجيل المبيعات اليومية", category: "مبيعات", description: "نموذج لتسجيل المبيعات اليومية مع تحليل الإيرادات", icon: "fas fa-chart-line", file: "تسجيل_المبيعات_اليومية.xlsx", size: "234 KB" },
            { id: "excel11", name: "نموذج جدول السلف والعهد", category: "محاسبة", description: "نموذج لإدارة السلف والعهد للموظفين", icon: "fas fa-hand-holding-usd", file: "سلف_و_عهد.xlsx", size: "198 KB" },
            { id: "excel12", name: "قالب جدول الإهلاك (Declining Balance)", category: "محاسبة", description: "نموذج لحساب إهلاك الأصول بطريقة الرصيد المتناقص", icon: "fas fa-chart-line", file: "الاهلاك_Declining_Balance.xlsx", size: "245 KB" },
            { id: "excel13", name: "نظام إدارة المشاريع Excel", category: "إدارة مشاريع", description: "نظام متكامل لإدارة المشاريع والمهام", icon: "fas fa-tasks", file: "ادارة_المشاريع.xlsx", size: "1.1 MB" },
            { id: "excel14", name: "نموذج قائمة التدفقات النقدية", category: "تحليل مالي", description: "نموذج لقائمة التدفقات النقدية", icon: "fas fa-chart-line", file: "قائمة_التدفقات_النقدية.xlsx", size: "312 KB" },
            { id: "excel15", name: "قالب تحليل التعادل (Break-Even)", category: "تحليل مالي", description: "نموذج لحساب نقطة التعادل وتحليل الربحية", icon: "fas fa-chart-line", file: "تحليل_التعادل_BreakEven.xlsx", size: "267 KB" },
            { id: "excel16", name: "نموذج تقييم المشاريع (NPV - IRR)", category: "تحليل مالي", description: "نموذج لحساب صافي القيمة الحالية", icon: "fas fa-chart-line", file: "تقييم_المشاريع_NPV_IRR.xlsx", size: "289 KB" },
            { id: "excel17", name: "نظام إدارة الفواتير (Invoicing)", category: "فواتير", description: "نظام متكامل لإدارة الفواتير والعملاء", icon: "fas fa-file-invoice", file: "نظام_الفواتير_Invoicing.xlsx", size: "567 KB" },
            { id: "excel18", name: "نموذج جدول الإهلاك (Sum of Years)", category: "محاسبة", description: "نموذج لحساب إهلاك الأصول بطريقة مجموع السنوات", icon: "fas fa-chart-line", file: "الاهلاك_Sum_of_Years.xlsx", size: "234 KB" },
            { id: "excel19", name: "قالب إدارة الوقت (Time Management)", category: "إدارة وقت", description: "نموذج لتنظيم المهام وتتبع الوقت", icon: "fas fa-clock", file: "ادارة_الوقت.xlsx", size: "198 KB" },
            { id: "excel20", name: "نظام محاسبي للشركات الصغيرة", category: "محاسبة", description: "نظام محاسبي متكامل للشركات الصغيرة", icon: "fas fa-building", file: "نظام_محاسبي_شركات_صغيرة.xlsx", size: "1.5 MB" }
        ];

        let currentSearch = "";

        function getFilteredFiles() {
            let filtered = excelFiles;
            if (currentSearch) {
                filtered = excelFiles.filter(file => 
                    file.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    file.description.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    file.category.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            return filtered;
        }

        function generateExcelFile(fileId) {
            const file = excelFiles.find(f => f.id === fileId);
            if (!file) return;
            
            let data = [];
            
            if (file.id === "excel1") {
                data = [
                    ["المنتج", "الكمية", "سعر الوحدة", "الإجمالي"],
                    ["منتج 1", 2, 100, 200],
                    ["منتج 2", 1, 250, 250],
                    ["منتج 3", 3, 50, 150],
                    ["", "", "الإجمالي الكلي", 600]
                ];
            } else if (file.id === "excel2") {
                data = [
                    ["الحساب", "مدين", "دائن"],
                    ["الصندوق", 10000, 0],
                    ["البنك", 5000, 0],
                    ["المبيعات", 0, 15000],
                    ["المشتريات", 3000, 0],
                    ["", "المجموع", 18000]
                ];
            } else if (file.id === "excel4") {
                data = [
                    ["الموظف", "الراتب الأساسي", "البدلات", "الاستقطاعات", "صافي الراتب"],
                    ["أحمد محمد", 5000, 1000, 500, 5500],
                    ["سارة علي", 6000, 1200, 600, 6600],
                    ["محمد خالد", 4500, 800, 400, 4900],
                    ["فاطمة حسن", 5500, 1100, 550, 6050]
                ];
            } else if (file.id === "excel7") {
                data = [
                    ["الإيرادات", "المبلغ", "المصروفات", "المبلغ"],
                    ["الراتب", 8000, "الإيجار", 2000],
                    ["العمل الحر", 2000, "المواصلات", 500],
                    ["الاستثمارات", 500, "الطعام", 1500],
                    ["", "", "الترفيه", 500],
                    ["إجمالي الإيرادات", 10500, "إجمالي المصروفات", 4500],
                    ["", "", "صافي الادخار", 6000]
                ];
            } else if (file.id === "excel13") {
                data = [
                    ["المهمة", "تاريخ البدء", "تاريخ الانتهاء", "الحالة", "نسبة الإنجاز"],
                    ["تخطيط المشروع", "2024-01-01", "2024-01-07", "مكتملة", "100%"],
                    ["التصميم", "2024-01-08", "2024-01-21", "قيد التنفيذ", "60%"],
                    ["التطوير", "2024-01-22", "2024-02-18", "لم تبدأ", "0%"],
                    ["الاختبار", "2024-02-19", "2024-03-04", "لم تبدأ", "0%"]
                ];
            } else if (file.id === "excel20") {
                data = [
                    ["نظام محاسبي متكامل للشركات الصغيرة"],
                    [],
                    ["قيد يومية", "مدين", "دائن"],
                    ["الصندوق", 15000, 0],
                    ["رأس المال", 0, 15000],
                    [],
                    ["ميزان المراجعة"],
                    ["الحساب", "مدين", "دائن"],
                    ["الصندوق", 15000, 0],
                    ["رأس المال", 0, 15000]
                ];
            } else {
                data = [
                    ["بيانات نموذجية لـ " + file.name],
                    ["العمود 1", "العمود 2", "العمود 3"],
                    ["قيمة 1", "قيمة 2", "قيمة 3"],
                    ["قيمة 4", "قيمة 5", "قيمة 6"]
                ];
            }
            
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, file.name);
            XLSX.writeFile(wb, file.file);
        }

        function displayFiles() {
            const container = document.getElementById("excelContainer");
            const filtered = getFilteredFiles();
            
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#D4AF37;">😅 لا توجد ملفات تطابق بحثك</div>`;
                return;
            }
            
            container.innerHTML = filtered.map(file => `
                <div class="excel-card" onclick="window.location.href='excel-details.html?id=${file.id}'">
                    <div class="excel-icon"><i class="${file.icon}"></i></div>
                    <div class="excel-info">
                        <h3 class="excel-name">${file.name}</h3>
                        <div class="excel-category"><i class="fas fa-tag"></i> ${file.category}</div>
                        <p class="excel-description">${file.description.substring(0, 80)}${file.description.length > 80 ? '...' : ''}</p>
                        <button class="download-btn" onclick="event.stopPropagation(); generateExcelFile('${file.id}')">
                            <i class="fas fa-download"></i> تحميل (${file.size})
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function setupSearch() {
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            searchBtn.addEventListener("click", () => { currentSearch = searchInput.value; displayFiles(); });
            searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") { currentSearch = searchInput.value; displayFiles(); } });
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) { userGreeting.style.display = "inline"; userGreeting.textContent = `مرحباً ${currentUser.name}`; }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    updateAuthUI();
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) toggle.addEventListener("click", () => navLinks.classList.toggle("active"));
        }

        setupSearch();
        displayFiles();
        updateAuthUI();
        setupLogout();
        setupMobileMenu();
    </script>
</body>
</html>
