            { title: "كيف تكسب المال من الإنترنت باستخدام الذكاء الاصطناعي في 2026", date: "2026-04-12", excerpt: "7 طرق عملية ومجربة لكسب المال من المنزل باستخدام أدوات الذكاء الاصطناعي...", image: "https://images.unsplash.com/photo-1553729459-efe14ef6055d?w=400&h=250&fit=crop", category: "ريادة أعمال", url: "post.html?title=كيف تكسب المال من الإنترنت باستخدام الذكاء الاصطناعي في 2026" },

            { title: "أفضل 10 أدوات ذكاء اصطناعي لتوليد الصور والفيديو", date: "2026-04-12", excerpt: "دليلك الشامل لأفضل أدوات الذكاء الاصطناعي لإنشاء الصور والفيديوهات الاحترافية...", image: "https://images.unsplash.com/photo-1574717024653-61fd2cf4dde1?w=400&h=250&fit=crop", category: "أدوات", url: "post.html?title=أفضل 10 أدوات ذكاء اصطناعي لتوليد الصور والفيديو" },
            { title: "كيف تبدأ مشروعك الخاص بالذكاء الاصطناعي بدون رأس مال", date: "2026-04-12", excerpt: "خطة عمل متكاملة لبدء مشروعك الخاص باستخدام الأدوات المجانية وتحقيق أرباح حقيقية...", image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&h=250&fit=crop", category: "ريادة أعمال", url: "post.html?title=كيف تبدأ مشروعك الخاص بالذكاء الاصطناعي بدون رأس مال" },
            { title: "دليلك الكامل لتعلم البرمجة بالذكاء الاصطناعي", date: "2026-04-12", excerpt: "من الصفر إلى الاحتراف: كيف تتعلم البرمجة باستخدام أدوات الذكاء الاصطناعي في 3 أشهر...", image: "https://images.unsplash.com/photo-1516116216624-53e697fedbea?w=400&h=250&fit=crop", category: "برمجة", url: "post.html?title=دليلك الكامل لتعلم البرمجة بالذكاء الاصطناعي" }
        ];

        let currentCategory = "all";

        function getCategories() {
            return ["الكل", ...new Set(posts.map(p => p.category))];
        }

        function buildCategoryButtons() {
            const container = document.getElementById("categoryFilter");
            const categories = getCategories();
            container.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = "category-btn";
                if (cat === currentCategory) btn.classList.add("active");
                btn.textContent = cat;
                btn.addEventListener("click", () => {
                    currentCategory = cat;
                    buildCategoryButtons();
                    displayPosts();
                });
                container.appendChild(btn);
            });
        }

        function displayPosts() {
            const container = document.getElementById("blogContainer");
            let filteredPosts = posts;
            if (currentCategory !== "الكل") {
                filteredPosts = posts.filter(p => p.category === currentCategory);
            }
            container.innerHTML = filteredPosts.map(post => `
                <div class="blog-card">
                    <img src="${post.image}" alt="${post.title}">
                    <div class="blog-card-content">
                        <span class="blog-date">${post.date} | ${post.category}</span>
                        <h3>${post.title}</h3>
                        <p>${post.excerpt}</p>
                        <a href="${post.url}" class="read-more">اقرأ المزيد <i class="fas fa-arrow-left"></i></a>
                    </div>
                </div>
            `).join('');
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) {
                    userGreeting.style.display = "inline";
                    userGreeting.textContent = `مرحباً ${currentUser.name}`;
                }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    updateAuthUI();
                    window.location.reload();
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }

        buildCategoryButtons();
        displayPosts();
        updateAuthUI();
        setupLogout();
        setupMobileMenu();
        
        // تأكيد إضافي لعرض المقالات بعد تحميل الصفحة
        setTimeout(function() {
            displayPosts();
        }, 100);
    </script>
