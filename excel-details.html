<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل القالب | Ramzone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .details-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: #1A1A1A;
            border-radius: 20px;
            border: 1px solid #2A2A2A;
            text-align: center;
        }
        .file-icon { font-size: 4rem; color: #D4AF37; margin-bottom: 20px; }
        .file-name { font-size: 2rem; margin-bottom: 15px; }
        .file-category { color: #D4AF37; margin-bottom: 20px; }
        .file-description { color: #CCCCCC; line-height: 1.8; margin-bottom: 30px; text-align: right; }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
            background: #0A0A0A;
            padding: 20px;
            border-radius: 15px;
        }
        .info-item { text-align: center; }
        .info-item i { font-size: 1.5rem; color: #D4AF37; margin-bottom: 8px; }
        .info-item .value { font-size: 1rem; font-weight: bold; color: white; }
        .info-item .label { font-size: 0.7rem; color: #888; }
        .format-select {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            margin: 20px auto;
            background: #0A0A0A;
            border: 1px solid #D4AF37;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: block;
        }
        .format-select option {
            background: #1A1A1A;
        }
        .download-btn {
            display: inline-block;
            background: #D4AF37;
            color: #0A0A0A;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
        .download-btn:hover { background: #FFF2B2; transform: scale(1.05); }
        .back-btn { display: inline-block; margin-bottom: 30px; color: #D4AF37; text-decoration: none; }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
        @media (max-width: 600px) {
            .whatsapp-float { width: 50px; height: 50px; font-size: 1.6rem; }
            .details-container { margin: 30px 15px; padding: 25px; }
            .file-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><img src="logo.png" alt="Ramzone Logo" class="logo-img"><span class="logo-text">Ramzone</span></div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a> <a href="blog.html">المدونة</a> <a href="courses.html">الكورسات</a>
                <a href="apps.html">تطبيقات وألعاب</a> <a href="excel-tools.html">قوالب Excel</a>
                <a href="login.html" id="authLink">تسجيل الدخول</a> <span id="userGreeting" style="display:none;"></span>
                <a href="#" id="logoutBtn" style="display:none;">تسجيل خروج</a>
            </div>
            <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="details-container" id="detailsContainer">
        <a href="excel-tools.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة إلى القائمة</a>
        <div id="detailsContent"></div>
    </div>

    <a href="https://wa.me/201069302075" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        const excelFiles = {
            "excel1": { name: "نموذج فاتورة مبيعات Excel", category: "فواتير", description: "نموذج جاهز لفاتورة مبيعات مع حسومات وضرائب. قالب احترافي من Microsoft.", icon: "fas fa-file-invoice", url: "https://templates.office.com/static/Invoice-TF-Business.xlsx", size: "245 KB", developer: "Microsoft", version: "2.0", features: ["حساب الضريبة المضافة", "خصومات متعددة", "إجمالي تلقائي", "قابل للطباعة"] },
            "excel2": { name: "نظام محاسبي متكامل Excel", category: "محاسبة", description: "نظام محاسبي كامل يشمل أستاذ عام، ميزانية، قائمة دخل.", icon: "fas fa-chart-line", url: "https://www.vertex42.com/Files/download2/accounting-ledger.xlsx", size: "1.2 MB", developer: "Vertex42", version: "3.0", features: ["دفتر أستاذ عام", "ميزانية عمومية", "قائمة دخل", "تقارير شهرية"] }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        const file = excelFiles[fileId];
        const container = document.getElementById("detailsContent");

        async function downloadFile(url, filename, format) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                
                if (format === 'xlsx') {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename.replace('.xlsx', '.xlsx');
                    link.click();
                    URL.revokeObjectURL(link.href);
                } 
                else if (format === 'csv') {
                    const text = await blob.text();
                    const ws = XLSX.read(text, { type: 'string' });
                    const csv = XLSX.utils.sheet_to_csv(ws.Sheets[ws.SheetNames[0]]);
                    const csvBlob = new Blob([csv], { type: 'text/csv' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(csvBlob);
                    link.download = filename.replace('.xlsx', '.csv');
                    link.click();
                    URL.revokeObjectURL(link.href);
                }
                else if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const text = await blob.text();
                    const doc = new jsPDF();
                    doc.text(text.substring(0, 5000), 10, 10);
                    doc.save(filename.replace('.xlsx', '.pdf'));
                }
                else if (format === 'html') {
                    const text = await blob.text();
                    const htmlBlob = new Blob([`<html><head><meta charset="UTF-8"></head><body><pre>${text}</pre></body></html>`], { type: 'text/html' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(htmlBlob);
                    link.download = filename.replace('.xlsx', '.html');
                    link.click();
                    URL.revokeObjectURL(link.href);
                }
            } catch (error) {
                console.error('Error downloading file:', error);
                alert('حدث خطأ في تحميل الملف. سيتم تحميل نسخة وهمية بديلة.');
                generateFallbackExcel(filename, format);
            }
        }

        function generateFallbackExcel(filename, format) {
            const data = [["بيانات نموذجية لـ " + filename], ["العمود 1", "العمود 2"], ["قيمة 1", "قيمة 2"]];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, filename.replace('.xlsx', '.xlsx'));
        }

        if (file) {
            document.title = `${file.name} | Ramzone`;
            const featuresHtml = file.features.map(f => `<li style="margin: 8px 0; padding-right: 25px; position: relative; color: #CCCCCC;">✓ ${f}</li>`).join('');
            container.innerHTML = `
                <div class="file-icon"><i class="${file.icon}"></i></div>
                <h1 class="file-name">${file.name}</h1>
                <div class="file-category"><i class="fas fa-tag"></i> ${file.category}</div>
                <p class="file-description">${file.description}</p>
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-file-excel"></i><div class="value">${file.size}</div><div class="label">حجم الملف</div></div>
                    <div class="info-item"><i class="fas fa-code-branch"></i><div class="value">${file.version}</div><div class="label">الإصدار</div></div>
                    <div class="info-item"><i class="fas fa-building"></i><div class="value">${file.developer}</div><div class="label">المطور</div></div>
                </div>
                <h3 style="color:#D4AF37; text-align:right; margin-bottom:15px;">✨ مميزات القالب</h3>
                <ul style="list-style:none; text-align:right; margin-bottom:30px;">
                    ${featuresHtml}
                </ul>
                <select class="format-select" id="format-select">
                    <option value="xlsx">📊 Excel (.xlsx)</option>
                    <option value="csv">📄 CSV (.csv)</option>
                    <option value="pdf">📑 PDF (.pdf)</option>
                    <option value="html">🌐 HTML (.html)</option>
                </select>
                <button class="download-btn" onclick="downloadFile('${file.url}', '${file.name.replace(/ /g, '_')}.xlsx', document.getElementById('format-select').value)">
                    <i class="fas fa-download"></i> تحميل ${file.name}
                </button>
            `;
        } else {
            container.innerHTML = `<p style="color:#ff6b6b;">😅 عذراً، الملف غير موجود</p><a href="excel-tools.html">العودة إلى القائمة</a>`;
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) { userGreeting.style.display = "inline"; userGreeting.textContent = `مرحباً ${currentUser.name}`; }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) toggle.addEventListener("click", () => navLinks.classList.toggle("active"));
        }

        updateAuthUI();
        setupLogout();
        setupMobileMenu();
    </script>
</body>
</html>
