<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل التطبيق | Ramzone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .details-container { max-width: 800px; margin: 60px auto; padding: 40px; background: #1A1A1A; border-radius: 20px; border: 1px solid #2A2A2A; text-align: center; }
        .app-icon { font-size: 4rem; color: #D4AF37; margin-bottom: 20px; }
        .app-name { font-size: 2rem; margin-bottom: 15px; }
        .app-category { color: #D4AF37; margin-bottom: 20px; }
        .app-description { color: #CCCCCC; line-height: 1.8; margin-bottom: 30px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin: 30px 0; background: #0A0A0A; padding: 20px; border-radius: 15px; }
        .info-item { text-align: center; }
        .info-item i { font-size: 1.5rem; color: #D4AF37; margin-bottom: 8px; }
        .info-item .value { font-size: 1rem; font-weight: bold; color: white; }
        .info-item .label { font-size: 0.7rem; color: #888; }
        .download-btn { display: inline-block; background: #D4AF37; color: #0A0A0A; padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; margin-top: 20px; }
        .download-btn:hover { background: #FFF2B2; transform: scale(1.05); }
        .back-btn { display: inline-block; margin-bottom: 30px; color: #D4AF37; text-decoration: none; }
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background-color: #25D366; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2rem; z-index: 1000; text-decoration: none; }
        @media (max-width: 600px) { .whatsapp-float { width: 50px; height: 50px; font-size: 1.6rem; } .details-container { margin: 30px 15px; padding: 25px; } .app-name { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><img src="logo.png" alt="Ramzone Logo" class="logo-img"><span class="logo-text">Ramzone</span></div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a> <a href="blog.html">المدونة</a> <a href="courses.html">الكورسات</a> <a href="apps.html">تطبيقات وألعاب</a>
                <a href="login.html" id="authLink">تسجيل الدخول</a> <span id="userGreeting" style="display:none;"></span> <a href="#" id="logoutBtn">تسجيل خروج</a>
            </div>
            <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="details-container" id="detailsContainer">
        <a href="apps.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة إلى القائمة</a>
        <div id="detailsContent"></div>
    </div>

    <a href="https://wa.me/201069302075" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        const appsData = {
            "pubg": { name: "PUBG Mobile", category: "ألعاب", description: "لعبة الباتل رويال الشهيرة. ناجاة 100 لاعب على جزيرة. استخدم التكتيك والأسلحة المناسبة للفوز.", icon: "fas fa-crosshairs", version: "3.4.0", size: "1.2 GB", downloads: "1B+", developer: "Tencent", downloadLink: "https://apkpure.net/pubg-mobile/com.tencent.ig/download" },
            "freefire": { name: "Free Fire MAX", category: "ألعاب", description: "لعبة الباتل رويال السريعة. مباريات 10 دقائق فقط. رسومات محسنة وجودة عالية.", icon: "fas fa-fire", version: "2.107.0", size: "850 MB", downloads: "1B+", developer: "Garena", downloadLink: "https://apkpure.net/free-fire-max/com.dts.freefiremax/download" },
            "callofduty": { name: "Call of Duty Mobile", category: "ألعاب", description: "لعبة إطلاق النار الاحترافية. استمتع بطور المعركة متعددة اللاعبين وطور الباتل رويال.", icon: "fas fa-gun", version: "1.9.0", size: "1.5 GB", downloads: "500M+", developer: "Activision", downloadLink: "https://apkpure.net/call-of-duty-mobile/com.activision.callofduty.shooter/download" },
            "whatsapp": { name: "WhatsApp", category: "تواصل", description: "تطبيق المراسلة الفورية الأشهر في العالم. يتيح إرسال الرسائل النصية والصور والفيديوهات.", icon: "fab fa-whatsapp", version: "2.24.8.85", size: "45 MB", downloads: "5B+", developer: "Meta", downloadLink: "https://apkpure.net/whatsapp-messenger/com.whatsapp/download" },
            "telegram": { name: "Telegram", category: "تواصل", description: "تطبيق مراسلة آمن وسريع مع بوتات متقدمة.", icon: "fab fa-telegram", version: "10.9.1", size: "72 MB", downloads: "1B+", developer: "Telegram FZ-LLC", downloadLink: "https://apkpure.net/telegram/org.telegram.messenger/download" },
            "netflix": { name: "Netflix", category: "ترفيه", description: "مشاهدة الأفلام والمسلسلات الحصرية. محتوى متنوع يناسب جميع الأذواق.", icon: "fab fa-netflix", version: "8.0.0", size: "65 MB", downloads: "1B+", developer: "Netflix", downloadLink: "https://apkpure.net/netflix/com.netflix.mediaclient/download" },
            "youtube": { name: "YouTube", category: "ترفيه", description: "مشاهدة الفيديوهات. تابع قنواتك المفضلة واكتشف محتوى جديد.", icon: "fab fa-youtube", version: "19.0.0", size: "55 MB", downloads: "10B+", developer: "Google", downloadLink: "https://apkpure.net/youtube/com.google.android.youtube/download" }
        };
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');
        const app = appsData[appId];
        const container = document.getElementById("detailsContent");
        if (app) {
            container.innerHTML = `<div class="app-icon"><i class="${app.icon}"></i></div><h1 class="app-name">${app.name}</h1><div class="app-category"><i class="fas fa-tag"></i> ${app.category}</div><p class="app-description">${app.description}</p><div class="info-grid"><div class="info-item"><i class="fas fa-code-branch"></i><div class="value">${app.version}</div><div class="label">الإصدار</div></div><div class="info-item"><i class="fas fa-database"></i><div class="value">${app.size}</div><div class="label">الحجم</div></div><div class="info-item"><i class="fas fa-download"></i><div class="value">${app.downloads}</div><div class="label">عدد التحميلات</div></div><div class="info-item"><i class="fas fa-building"></i><div class="value">${app.developer}</div><div class="label">المطور</div></div></div><a href="${app.downloadLink}" target="_blank" class="download-btn"><i class="fas fa-download"></i> تحميل ${app.name}</a>`;
        } else { container.innerHTML = `<p style="color:#ff6b6b;">😅 عذراً، التطبيق غير موجود</p><a href="apps.html">العودة إلى القائمة</a>`; }
        function updateAuthUI() { const currentUser = JSON.parse(localStorage.getItem("currentUser")); const authLink = document.getElementById("authLink"); const userGreeting = document.getElementById("userGreeting"); const logoutBtn = document.getElementById("logoutBtn"); if (currentUser) { if (authLink) authLink.style.display = "none"; if (userGreeting) { userGreeting.style.display = "inline"; userGreeting.textContent = `مرحباً ${currentUser.name}`; } if (logoutBtn) logoutBtn.style.display = "inline"; } else { if (authLink) authLink.style.display = "inline"; if (userGreeting) userGreeting.style.display = "none"; if (logoutBtn) logoutBtn.style.display = "none"; } }
        function setupLogout() { const logoutBtn = document.getElementById("logoutBtn"); if (logoutBtn) { logoutBtn.addEventListener("click", (e) => { e.preventDefault(); localStorage.removeItem("currentUser"); window.location.href = "index.html"; }); } }
        function setupMobileMenu() { const toggle = document.getElementById("mobileMenu"); const navLinks = document.getElementById("navLinks"); if (toggle && navLinks) toggle.addEventListener("click", () => navLinks.classList.toggle("active")); }
        updateAuthUI(); setupLogout(); setupMobileMenu();
    </script>
</body>
</html>
