<head>

    <title>تفاصيل التطبيق | Ramzone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        .details-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            background: #1A1A1A;
            border-radius: 20px;
            border: 1px solid #2A2A2A;
        }
        .app-header { text-align: center; margin-bottom: 40px; }
        .app-icon { font-size: 5rem; color: #D4AF37; margin-bottom: 20px; }
        .app-name { font-size: 2rem; margin-bottom: 10px; }
        .app-category { display: inline-block; background: #D4AF37; color: #0A0A0A; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; }
        .app-description { color: #CCCCCC; line-height: 1.9; margin: 30px 0; font-size: 1rem; }
        .features-title { color: #D4AF37; font-size: 1.3rem; margin: 30px 0 15px; border-right: 3px solid #D4AF37; padding-right: 15px; }
        .features-list { list-style: none; padding: 0; }
        .features-list li { margin: 12px 0; padding-right: 25px; position: relative; color: #CCCCCC; }
        .features-list li:before { content: "✓"; color: #D4AF37; position: absolute; right: 0; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; background: #0A0A0A; padding: 20px; border-radius: 15px; }
        .info-item { text-align: center; }
        .info-item i { font-size: 1.5rem; color: #D4AF37; margin-bottom: 8px; }
        .info-item .label { font-size: 0.7rem; color: #888; }
        .info-item .value { font-size: 1rem; font-weight: bold; color: white; }
        .download-btn { display: inline-block; background: #D4AF37; color: #0A0A0A; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s; width: 100%; text-align: center; margin-top: 20px; }
        .download-btn:hover { background: #FFF2B2; transform: scale(1.02); }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #D4AF37; text-decoration: none; }
        .back-btn:hover { text-decoration: underline; }
        .ad-space { margin: 30px 0; min-height: 90px; }
        .loading { text-align: center; padding: 50px; color: #D4AF37; }
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background-color: #25D366; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2rem; z-index: 1000; text-decoration: none; }
        .whatsapp-float:hover { transform: scale(1.1); }
        @media (max-width: 600px) {
            .whatsapp-float { width: 50px; height: 50px; font-size: 1.6rem; }
            .details-container { margin: 30px 15px; padding: 25px; }
            .app-name { font-size: 1.5rem; }
            .info-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="logo.png" alt="Ramzone Logo" class="logo-img">
                <span class="logo-text">Ramzone</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a>
                <a href="blog.html">المدونة</a>
                <a href="courses.html">الكورسات</a>
                <a href="apps.html">تطبيقات وألعاب</a>
                <a href="login.html" id="authLink">تسجيل الدخول</a>
                <span id="userGreeting" style="display:none; color:#D4AF37;"></span>
                <a href="#" id="logoutBtn" style="display:none;">تسجيل خروج</a>
            </div>
            <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="details-container" id="detailsContainer">
        <a href="apps.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة إلى القائمة</a>
        <div id="detailsContent" class="loading">
            <i class="fas fa-spinner fa-pulse"></i> جاري تحميل بيانات التطبيق...
        </div>
        <div class="ad-space" id="adSpace"></div>
    </div>

    <a href="https://wa.me/201069302075" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Ramzone - جميع الحقوق محفوظة</p>
            <div class="social-icons">
                <a href="https://linkedin.com/in/ramadanm200110" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://twitter.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com/ra_mah077" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://facebook.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-facebook-f"></i></a>
            </div>
            <div class="footer-links">
                <a href="terms.html">شروط الاستخدام</a>
                <a href="terms.html#privacy">سياسة الخصوصية</a>
            </div>
        </div>
    </footer>

    <script>
        function displayApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const appId = urlParams.get('id');
            
            if (!appId) {
                document.getElementById("detailsContent").innerHTML = `<p style="color:#ff6b6b; text-align:center;">😅 لم يتم تحديد التطبيق</p><a href="apps.html" style="display:block; text-align:center; color:#D4AF37;">العودة إلى القائمة</a>`;
                return;
            }
            
            // البحث في appsConfig (البيانات اليدوية الكاملة)
            if (typeof appsConfig !== 'undefined' && appsConfig) {
                const app = appsConfig.find(a => a.id === appId);
                if (app) {
                    displayAppContent(app);
                    return;
                }
            }
            
            // البحث في appsData (بيانات Google Play)
            if (typeof appsData !== 'undefined' && appsData) {
                const app = appsData.find(a => a.id === appId);
                if (app) {
                    displayAppContent(app);
                    return;
                }
            }
            
            document.getElementById("detailsContent").innerHTML = `<p style="color:#ff6b6b; text-align:center;">😅 عذراً، التطبيق غير موجود</p><a href="apps.html" style="display:block; text-align:center; color:#D4AF37;">العودة إلى القائمة</a>`;
        }
        
        function displayAppContent(app) {
            const version = app.manualVersion || app.version || "غير معروف";
            const size = app.manualSize || app.size || "غير معروف";
            const downloads = app.manualDownloads || app.downloads || "غير معروف";
            const developer = app.manualDeveloper || app.developer || "غير معروف";
            const description = app.manualDescription || app.description || "لا يوجد وصف متاح لهذا التطبيق";
            const features = app.manualFeatures || app.features || ["لا توجد مميزات متاحة حالياً"];
            
            document.getElementById("detailsContent").innerHTML = `
                <div class="app-header">
                    <div class="app-icon"><i class="${app.icon || 'fas fa-mobile-alt'}"></i></div>
                    <h1 class="app-name">${escapeHtml(app.name)}</h1>
                    <span class="app-category">${app.category || 'تطبيق'}</span>
                </div>
                <p class="app-description">${escapeHtml(description)}</p>
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-code-branch"></i><div class="value">${escapeHtml(version)}</div><div class="label">الإصدار</div></div>
                    <div class="info-item"><i class="fas fa-database"></i><div class="value">${escapeHtml(size)}</div><div class="label">الحجم</div></div>
                    <div class="info-item"><i class="fas fa-download"></i><div class="value">${escapeHtml(downloads)}</div><div class="label">عدد التحميلات</div></div>
                    <div class="info-item"><i class="fas fa-building"></i><div class="value">${escapeHtml(developer)}</div><div class="label">المطور</div></div>
                </div>
                <h3 class="features-title">✨ مميزات التطبيق</h3>
                <ul class="features-list">${features.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>
                <a href="${app.downloadLink || '#'}" target="_blank" class="download-btn"><i class="fas fa-download"></i> تحميل ${escapeHtml(app.name)}</a>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function loadData() {
            let loadedCount = 0;
            function checkDone() {
                loadedCount++;
                if (loadedCount >= 2) displayApp();
            }
            const script1 = document.createElement('script');
            script1.src = 'data/apps-data.js?_=' + new Date().getTime();
            script1.onload = checkDone;
            script1.onerror = checkDone;
            document.head.appendChild(script1);
            
            const script2 = document.createElement('script');
            script2.src = 'data/apps-data-complete.js?_=' + new Date().getTime();
            script2.onload = checkDone;
            script2.onerror = checkDone;
            document.head.appendChild(script2);
        }
        
        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) { userGreeting.style.display = "inline"; userGreeting.textContent = `مرحباً ${currentUser.name}`; }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }

        updateAuthUI();
        setupLogout();
        setupMobileMenu();
        loadData();
    </script>
</body>
</html>
