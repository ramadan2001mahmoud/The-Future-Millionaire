        .details-container {

            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .app-description {
            color: #CCCCCC;
            line-height: 1.9;
            margin: 30px 0;
            font-size: 1rem;
        }
        .features-title {
            color: #D4AF37;
            font-size: 1.3rem;
            margin: 30px 0 15px;
            border-right: 3px solid #D4AF37;
            padding-right: 15px;
        }
        .features-list {
            list-style: none;
            padding: 0;
        }
        .features-list li {
            margin: 12px 0;
            padding-right: 25px;
            position: relative;
            color: #CCCCCC;
        }
        .features-list li:before {
            content: "✓";
            color: #D4AF37;
            position: absolute;
            right: 0;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
            background: #0A0A0A;
            padding: 20px;
            border-radius: 15px;
        }
        .info-item {
            text-align: center;
        }
        .info-item i {
            font-size: 1.5rem;
            color: #D4AF37;
            margin-bottom: 8px;
        }
        .info-item .label {
            font-size: 0.7rem;
            color: #888;
        }
        .info-item .value {
            font-size: 1rem;
            font-weight: bold;
            color: white;
        }
        .download-btn {
            display: inline-block;
            background: #D4AF37;
            color: #0A0A0A;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            width: 100%;
            text-align: center;
            margin-top: 20px;
        }
        .download-btn:hover {
            background: #FFF2B2;
            transform: scale(1.02);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #D4AF37;
            text-decoration: none;
        }
        .back-btn:hover {
            text-decoration: underline;
        }

        .ad-space {
            margin: 30px 0;
            min-height: 90px;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            z-index: 1000;
            text-decoration: none;

                    userGreeting.textContent = `مرحباً ${currentUser.name}`;
                }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }

        updateAuthUI();
        setupLogout();
        setupMobileMenu();
    </script>
</body>
</html>
