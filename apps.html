    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        .apps-header {
            text-align: center;
            padding: 60px 20px 30px;
            background: linear-gradient(135deg, #0A0A0A, #1A1A1A);
        }
        .apps-header h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .search-apps {
            max-width: 500px;
            margin: 30px auto;
            display: flex;
            gap: 10px;
        }
        .search-apps input {
            flex: 1;
            padding: 12px 20px;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
        }
        .search-apps button {
            background: #D4AF37;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 30px 20px;
        }
        .cat-btn {
            background: #1A1A1A;
            border: 1px solid #333;
            color: white;
            padding: 8px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #D4AF37;
            color: #0A0A0A;
        }
        .apps-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }
        .app-card {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #2A2A2A;
            cursor: pointer;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: #D4AF37;
        }
        .app-card i {
            font-size: 3rem;
            color: #D4AF37;
            margin-bottom: 15px;
        }
        .app-card h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .app-card p {
            font-size: 0.8rem;
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #D4AF37;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
        @media (max-width: 600px) {
            .whatsapp-float { width: 50px; height: 50px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

                <span class="logo-text">Ramzone</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a>
                <a href="blog.html">المدونة</a>
                <a href="courses.html">الكورسات</a>
                <a href="apps.html" class="active">تطبيقات وألعاب</a>
                <a href="login.html" id="authLink">تسجيل الدخول</a>
                <span id="userGreeting" style="display:none; color:#D4AF37;"></span>
                <a href="#" id="logoutBtn" style="display:none;">تسجيل خروج</a>
            </div>
            <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <section class="apps-header">
        <h1>تطبيقات وألعاب <span class="gold">Ramzone</span></h1>
        <p>أكثر من 150 تطبيق ولعبة - صفحة تعريفية لكل تطبيق</p>
        <div class="search-apps">
            <input type="text" id="searchInput" placeholder="ابحث عن تطبيق أو لعبة...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </section>

    <div class="category-filter" id="categoryFilter">
        <button class="cat-btn active" data-cat="all">الكل</button>
        <button class="cat-btn" data-cat="تواصل">📱 تواصل</button>
        <button class="cat-btn" data-cat="إنتاجية">📊 إنتاجية</button>
        <button class="cat-btn" data-cat="أدوات">🛠️ أدوات</button>
        <button class="cat-btn" data-cat="تعليم">📚 تعليم</button>
        <button class="cat-btn" data-cat="ترفيه">🎬 ترفيه</button>
        <button class="cat-btn" data-cat="ألعاب">🎮 ألعاب</button>
    </div>

    <div class="apps-container" id="appsContainer">
        <div class="loading">
            <i class="fas fa-spinner fa-pulse"></i> جاري تحميل التطبيقات...
        </div>
    </div>

    <a href="https://wa.me/201069302075" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer class="footer">

            <p>&copy; 2026 Ramzone - جميع الحقوق محفوظة</p>

                <a href="https://linkedin.com/in/ramadanm200110" target="_blank"><i class="fab fa-linkedin-in"></i></a>

                <a href="https://github.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://facebook.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-facebook-f"></i></a>
            </div>
            <div class="footer-links">
                <a href="terms.html">شروط الاستخدام</a>
                <a href="terms.html#privacy">سياسة الخصوصية</a>
            </div>
        </div>
    </footer>

    <script>
        let allApps = [];
        let currentCategory = "all";
        let currentSearch = "";

        function displayApps() {
            const container = document.getElementById("appsContainer");
            let filtered = allApps;
            
            if (currentCategory !== "all") {
                filtered = filtered.filter(app => app.category === currentCategory);
            }
            if (currentSearch) {
                filtered = filtered.filter(app => 
                    app.name.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#D4AF37;">😅 لا توجد تطبيقات تطابق بحثك</div>`;
                return;
            }
            
            container.innerHTML = filtered.map(app => `
                <div class="app-card" onclick="window.location.href='app-details.html?id=${app.id}'">
                    <i class="${app.icon}"></i>
                    <h3>${escapeHtml(app.name)}</h3>
                    <p>${app.category}</p>
                </div>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function setupCategoryFilters() {
            const buttons = document.querySelectorAll(".cat-btn");
            buttons.forEach(btn => {
                btn.addEventListener("click", () => {
                    buttons.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = btn.getAttribute("data-cat");
                    displayApps();
                });
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            searchBtn.addEventListener("click", () => {
                currentSearch = searchInput.value;
                displayApps();
            });
            searchInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    currentSearch = searchInput.value;
                    displayApps();
                }
            });
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) {
                    userGreeting.style.display = "inline";
                    userGreeting.textContent = `مرحباً ${currentUser.name}`;
                }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    updateAuthUI();
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }

        // تحميل البيانات من الملف الخارجي
        function loadAppsData() {
            const script = document.createElement('script');
            script.src = 'data/apps-data.js?_=' + new Date().getTime();
            script.onload = function() {
                if (typeof appsConfig !== 'undefined' && appsConfig) {
                    allApps = appsConfig;
                    displayApps();
                } else {
                    document.getElementById("appsContainer").innerHTML = `<div style="text-align:center; padding:50px; color:#ff6b6b;">😅 خطأ في تحميل البيانات</div>`;
                }
            };
            script.onerror = function() {
                document.getElementById("appsContainer").innerHTML = `<div style="text-align:center; padding:50px; color:#ff6b6b;">😅 خطأ في تحميل البيانات</div>`;
            };
            document.head.appendChild(script);
        }

        setupCategoryFilters();
        setupSearch();
        updateAuthUI();
        setupLogout();
        setupMobileMenu();
        loadAppsData();
    </script>
</body>
</html>
