            color: #0A0A0A;
        }
        .apps-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .app-card {
            background: #1A1A1A;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #2A2A2A;
            cursor: pointer;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: #D4AF37;
        }
        .app-icon {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2A2A2A, #1A1A1A);
        }
        .app-icon img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 16px;
            transition: transform 0.3s ease;
        }
        .app-card:hover .app-icon img {
            transform: scale(1.05);
        }
        .app-info {
            padding: 20px;
            text-align: center;
        }
        .app-name {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .app-category {
            color: #D4AF37;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }
        .app-description {
            color: #CCCCCC;
            font-size: 0.8rem;
            margin-bottom: 15px;
            line-height: 1.5;
            height: 60px;
            overflow: hidden;
        }
        .download-btn {
            display: inline-block;
            background: #D4AF37;
            color: #0A0A0A;
            padding: 10px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
            width: 100%;
            text-align: center;
        }
        .download-btn:hover {
            background: #FFF2B2;

        .whatsapp-float {

            right: 30px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;

            align-items: center;
            justify-content: center;

            text-decoration: none;

            { id: "edx", name: "EdX", category: "تعليم", description: "دورات من جامعات عالمية مثل هارفارد.", icon: "edx.svg", downloadLink: "https://apkpure.net/edx/org.edx.mobile/download" }
        ];

        let currentCategory = "all";
        let currentSearch = "";

        function getFilteredApps() {
            let filtered = apps;
            if (currentCategory !== "all") {
                filtered = filtered.filter(app => app.category === currentCategory);
            }
            if (currentSearch) {
                filtered = filtered.filter(app => 
                    app.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    app.description.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            return filtered;
        }

        function displayApps() {
            const container = document.getElementById("appsContainer");
            const filtered = getFilteredApps();
            
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#D4AF37;">😅 لا توجد تطبيقات تطابق بحثك</div>`;
                return;
            }
            
            container.innerHTML = filtered.map(app => `
                <div class="app-card" onclick="window.location.href='app-details.html?id=${app.id}'">
                    <div class="app-icon">
                        <img src="icons/${app.icon}" alt="${app.name}" onerror="this.src='icons/default.svg'">
                    </div>
                    <div class="app-info">
                        <h3 class="app-name">${app.name}</h3>
                        <div class="app-category"><i class="fas fa-tag"></i> ${app.category}</div>
                        <p class="app-description">${app.description.substring(0, 80)}${app.description.length > 80 ? '...' : ''}</p>
                        <a href="${app.downloadLink}" target="_blank" class="download-btn" onclick="event.stopPropagation()">
                            <i class="fas fa-download"></i> تحميل
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function setupCategoryFilters() {
            const buttons = document.querySelectorAll(".cat-btn");
            buttons.forEach(btn => {
                btn.addEventListener("click", () => {
                    buttons.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = btn.getAttribute("data-cat");
                    displayApps();
                });
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            searchBtn.addEventListener("click", () => {
                currentSearch = searchInput.value;
                displayApps();
            });
            searchInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    currentSearch = searchInput.value;
                    displayApps();
                }
            });
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) {
                    userGreeting.style.display = "inline";
                    userGreeting.textContent = `مرحباً ${currentUser.name}`;
                }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    updateAuthUI();
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }

        setupCategoryFilters();
        setupSearch();
        displayApps();
        updateAuthUI();
        setupLogout();
        setupMobileMenu();
    </script>
</body>
</html>
