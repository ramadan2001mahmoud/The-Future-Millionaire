    <title>تطبيقات وألعاب | Ramzone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .apps-header {
            text-align: center;
            padding: 60px 20px 30px;
            background: linear-gradient(135deg, #0A0A0A, #1A1A1A);
        }
        .apps-header h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .search-apps {
            max-width: 500px;
            margin: 30px auto;
            display: flex;
            gap: 10px;
        }
        .search-apps input {
            flex: 1;
            padding: 12px 20px;
            background: #1A1A1A;
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
        }
        .search-apps button {
            background: #D4AF37;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 30px 20px;
        }
        .cat-btn {
            background: #1A1A1A;
            border: 1px solid #333;
            color: white;
            padding: 8px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #D4AF37;
            color: #0A0A0A;
        }
        .apps-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .app-card {
            background: #1A1A1A;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #2A2A2A;
            cursor: pointer;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: #D4AF37;
        }
        .app-icon {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2A2A2A, #1A1A1A);
            font-size: 3rem;
            color: #D4AF37;
        }
        .app-info {
            padding: 20px;
            text-align: center;
        }
        .app-name {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .app-category {
            color: #D4AF37;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }
        .app-description {
            color: #CCCCCC;
            font-size: 0.8rem;
            margin-bottom: 15px;
            line-height: 1.5;
            height: 60px;
            overflow: hidden;
        }
        .download-btn {
            display: inline-block;
            background: #D4AF37;
            color: #0A0A0A;
            padding: 10px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
            width: 100%;
            text-align: center;
        }
        .download-btn:hover {
            background: #FFF2B2;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
        @media (max-width: 600px) {
            .whatsapp-float { width: 50px; height: 50px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="logo.png" alt="Ramzone Logo" class="logo-img">
                <span class="logo-text">Ramzone</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a>
                <a href="blog.html">المدونة</a>
                <a href="courses.html">الكورسات</a>
                <a href="apps.html" class="active">تطبيقات وألعاب</a>
                <a href="login.html" id="authLink">تسجيل الدخول</a>
                <span id="userGreeting" style="display:none; color:#D4AF37;"></span>
                <a href="#" id="logoutBtn" style="display:none;">تسجيل خروج</a>
            </div>
            <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <section class="apps-header">
        <h1>تطبيقات وألعاب <span class="gold">Ramzone</span></h1>
        <p>أكثر من 150 تطبيق ولعبة - تحميل مباشر</p>
        <div class="search-apps">
            <input type="text" id="searchInput" placeholder="ابحث عن تطبيق أو لعبة...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </section>

    <div class="category-filter" id="categoryFilter">
        <button class="cat-btn active" data-cat="all">الكل</button>
        <button class="cat-btn" data-cat="ألعاب">🎮 ألعاب</button>
        <button class="cat-btn" data-cat="تواصل">📱 تواصل</button>
        <button class="cat-btn" data-cat="ترفيه">🎬 ترفيه</button>
        <button class="cat-btn" data-cat="أدوات">🛠️ أدوات</button>
        <button class="cat-btn" data-cat="تعليم">📚 تعليم</button>
    </div>

    <div class="apps-container" id="appsContainer"></div>

    <a href="https://wa.me/201069302075" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Ramzone - جميع الحقوق محفوظة</p>
            <div class="social-icons">
                <a href="https://linkedin.com/in/ramadanm200110" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://twitter.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com/ra_mah077" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://facebook.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-facebook-f"></i></a>
            </div>
            <div class="footer-links">
                <a href="terms.html">شروط الاستخدام</a>
                <a href="terms.html#privacy">سياسة الخصوصية</a>
            </div>
        </div>
    </footer>

    <script>
        const apps = [
            { id: "pubg", name: "PUBG Mobile", category: "ألعاب", description: "لعبة الباتل رويال الشهيرة", icon: "fas fa-crosshairs", downloadLink: "https://apkpure.net/pubg-mobile/com.tencent.ig/download" },
            { id: "freefire", name: "Free Fire MAX", category: "ألعاب", description: "لعبة الباتل رويال السريعة", icon: "fas fa-fire", downloadLink: "https://apkpure.net/free-fire-max/com.dts.freefiremax/download" },
            { id: "callofduty", name: "Call of Duty Mobile", category: "ألعاب", description: "لعبة إطلاق النار الاحترافية", icon: "fas fa-gun", downloadLink: "https://apkpure.net/call-of-duty-mobile/com.activision.callofduty.shooter/download" },
            { id: "clashofclans", name: "Clash of Clans", category: "ألعاب", description: "لعبة بناء القرى والحروب", icon: "fas fa-chess-king", downloadLink: "https://apkpure.net/clash-of-clans/com.supercell.clashofclans/download" },
            { id: "whatsapp", name: "WhatsApp", category: "تواصل", description: "تطبيق المراسلة الفورية", icon: "fab fa-whatsapp", downloadLink: "https://apkpure.net/whatsapp-messenger/com.whatsapp/download" },
            { id: "telegram", name: "Telegram", category: "تواصل", description: "تطبيق مراسلة آمن", icon: "fab fa-telegram", downloadLink: "https://apkpure.net/telegram/org.telegram.messenger/download" },
            { id: "facebook", name: "Facebook", category: "تواصل", description: "تطبيق التواصل الاجتماعي", icon: "fab fa-facebook", downloadLink: "https://apkpure.net/facebook/com.facebook.katana/download" },
            { id: "instagram", name: "Instagram", category: "تواصل", description: "مشاركة الصور والفيديوهات", icon: "fab fa-instagram", downloadLink: "https://apkpure.net/instagram/com.instagram.android/download" },
            { id: "netflix", name: "Netflix", category: "ترفيه", description: "مشاهدة الأفلام والمسلسلات", icon: "fab fa-netflix", downloadLink: "https://apkpure.net/netflix/com.netflix.mediaclient/download" },
            { id: "youtube", name: "YouTube", category: "ترفيه", description: "مشاهدة الفيديوهات", icon: "fab fa-youtube", downloadLink: "https://apkpure.net/youtube/com.google.android.youtube/download" },
            { id: "spotify", name: "Spotify", category: "ترفيه", description: "بث الموسيقى والبودكاست", icon: "fab fa-spotify", downloadLink: "https://apkpure.net/spotify/com.spotify.music/download" },
            { id: "tiktok", name: "TikTok", category: "ترفيه", description: "مقاطع فيديو قصيرة", icon: "fab fa-tiktok", downloadLink: "https://apkpure.net/tiktok/com.zhiliaoapp.musically/download" },
            { id: "duolingo", name: "Duolingo", category: "تعليم", description: "تعلم اللغات مجاناً", icon: "fas fa-language", downloadLink: "https://apkpure.net/duolingo/com.duolingo/download" },
            { id: "truecaller", name: "Truecaller", category: "أدوات", description: "معرف المتصلين", icon: "fas fa-phone-alt", downloadLink: "https://apkpure.net/truecaller/com.truecaller/download" },
            { id: "vlc", name: "VLC", category: "أدوات", description: "مشغل فيديو متعدد الصيغ", icon: "fas fa-play-circle", downloadLink: "https://apkpure.net/vlc/org.videolan.vlc/download" }
        ];

        let currentCategory = "all";
        let currentSearch = "";

        function getFilteredApps() {
            let filtered = apps;
            if (currentCategory !== "all") {
                filtered = filtered.filter(app => app.category === currentCategory);
            }
            if (currentSearch) {
                filtered = filtered.filter(app => 
                    app.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    app.description.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            return filtered;
        }

        function displayApps() {
            const container = document.getElementById("appsContainer");
            const filtered = getFilteredApps();
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#D4AF37;">😅 لا توجد تطبيقات تطابق بحثك</div>`;
                return;
            }
            container.innerHTML = filtered.map(app => `
                <div class="app-card" onclick="window.location.href='app-details.html?id=${app.id}'">
                    <div class="app-icon"><i class="${app.icon}"></i></div>
                    <div class="app-info">
                        <h3 class="app-name">${app.name}</h3>
                        <div class="app-category">${app.category}</div>
                        <p class="app-description">${app.description}</p>
                        <a href="${app.downloadLink}" target="_blank" class="download-btn" onclick="event.stopPropagation()"><i class="fas fa-download"></i> تحميل</a>
                    </div>
                </div>
            `).join('');
        }

        function setupCategoryFilters() {
            const buttons = document.querySelectorAll(".cat-btn");
            buttons.forEach(btn => {
                btn.addEventListener("click", () => {
                    buttons.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = btn.getAttribute("data-cat");
                    displayApps();
                });
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            searchBtn.addEventListener("click", () => {
                currentSearch = searchInput.value;
                displayApps();
            });
            searchInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    currentSearch = searchInput.value;
                    displayApps();
                }
            });
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) {
                    userGreeting.style.display = "inline";
                    userGreeting.textContent = `مرحباً ${currentUser.name}`;
                }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    updateAuthUI();
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }

        setupCategoryFilters();
        setupSearch();
        displayApps();
        updateAuthUI();
        setupLogout();
        setupMobileMenu();
    </script>
</body>
</html>
