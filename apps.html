        let currentCategory = "all";
        let currentSearch = "";

        function getFilteredApps() {
            let filtered = apps;
            if (currentCategory !== "all") {
                filtered = filtered.filter(app => app.category === currentCategory);
            }
            if (currentSearch) {
                filtered = filtered.filter(app => 
                    app.name.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            return filtered;
        }

        function displayApps() {
            const container = document.getElementById("appsContainer");
            const filtered = getFilteredApps();
            
            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#D4AF37;">😅 لا توجد تطبيقات تطابق بحثك</div>`;
                return;
            }
            
            container.innerHTML = filtered.map(app => `
                <div class="app-card" onclick="window.location.href='app-details.html?id=${app.id}'">
                    <i class="${app.icon}"></i>
                    <h3>${app.name}</h3>
                    <p>${app.description.substring(0, 50)}...</p>
                </div>
            `).join('');
        }

        function setupCategoryFilters() {
            const buttons = document.querySelectorAll(".cat-btn");
            buttons.forEach(btn => {
                btn.addEventListener("click", () => {
                    buttons.forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    currentCategory = btn.getAttribute("data-cat");
                    displayApps();
                });
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById("searchInput");
            const searchBtn = document.getElementById("searchBtn");
            searchBtn.addEventListener("click", () => {
                currentSearch = searchInput.value;
                displayApps();
            });
            searchInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    currentSearch = searchInput.value;
                    displayApps();
                }
            });
        }

        function updateAuthUI() {
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            const authLink = document.getElementById("authLink");
            const userGreeting = document.getElementById("userGreeting");
            const logoutBtn = document.getElementById("logoutBtn");
            if (currentUser) {
                if (authLink) authLink.style.display = "none";
                if (userGreeting) {
                    userGreeting.style.display = "inline";
                    userGreeting.textContent = `مرحباً ${currentUser.name}`;
                }
                if (logoutBtn) logoutBtn.style.display = "inline";
            } else {
                if (authLink) authLink.style.display = "inline";
                if (userGreeting) userGreeting.style.display = "none";
                if (logoutBtn) logoutBtn.style.display = "none";
            }
        }

        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    updateAuthUI();
                    window.location.href = "index.html";
                });
            }
        }

        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }

        setupCategoryFilters();
        setupSearch();
        displayApps();
        updateAuthUI();
        setupLogout();
        setupMobileMenu();
    </script>
