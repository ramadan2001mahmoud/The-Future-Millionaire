<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LEQF7LQ0WY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

    <!-- SEO Meta Tags -->
    <title>لوحة تحكم المشرف | Ramzone</title>
    <meta name="description" content="لوحة تحكم المشرف في Ramzone">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 20px;
        }
        .admin-header {
            background: linear-gradient(135deg, #1A1A1A, #0A0A0A);
            border: 1px solid #D4AF37;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-card i { font-size: 2rem; color: #D4AF37; }
        .stat-card .number { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        .section-title {
            font-size: 1.5rem;
            margin: 30px 0 20px;
            color: #D4AF37;
            border-right: 3px solid #D4AF37;
            padding-right: 15px;
        }
        .users-table, .tools-table {
            width: 100%;
            background: #1A1A1A;
            border-radius: 15px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #2A2A2A;
        }
        th { background: #0A0A0A; color: #D4AF37; }
        .delete-user-btn, .delete-tool-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .add-tool-form {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .add-tool-form input, .add-tool-form select {
            padding: 10px;
            background: #0A0A0A;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            flex: 1;
            min-width: 150px;
        }
        .add-tool-form button {
            background: #D4AF37;
            color: #0A0A0A;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .admin-badge {
            background: #D4AF37;
            color: #0A0A0A;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-float:hover { transform: scale(1.1); background-color: #20b859; }
        @media (max-width: 600px) {
            .whatsapp-float { width: 50px; height: 50px; font-size: 1.6rem; bottom: 20px; right: 20px; }
        }
        .footer-links { margin-top: 15px; }
        .footer-links a { color: #D4AF37; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="logo.png" alt="Ramzone Logo" class="logo-img">
                <span class="logo-text">Ramzone</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a>
                <a href="blog.html">المدونة</a>
                <a href="dashboard.html">لوحة التحكم</a>
                <a href="#" id="logoutBtn">تسجيل خروج</a>
            </div>
            <div class="menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="admin-container" id="adminContainer"></div>

    <a href="https://wa.me/201069302075" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Ramzone - جميع الحقوق محفوظة</p>
            <div class="social-icons">
                <a href="https://linkedin.com/in/ramadanm200110" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://twitter.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-twitter"></i></a>
                <a href="https://instagram.com/ra_mah077" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://facebook.com/ramadan2001mahmoud" target="_blank"><i class="fab fa-facebook-f"></i></a>
            </div>
            <div class="footer-links">
                <a href="terms.html">شروط الاستخدام</a>
                <a href="terms.html#privacy">سياسة الخصوصية</a>
            </div>
        </div>
    </footer>

    <script>
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        
        if (!currentUser || currentUser.role !== "admin") {
            window.location.href = "index.html";
        }

        let users = JSON.parse(localStorage.getItem("users") || "[]");
        let toolsClicks = JSON.parse(localStorage.getItem("toolsClicks") || "{}");
        
        const defaultToolsList = [
            "ChatGPT", "Claude", "Perplexity AI", "Gemini", "DeepSeek", "Copy.ai", "Jasper",
            "Midjourney", "DALL-E 3", "Leonardo.ai", "Stable Diffusion", "Adobe Firefly",
            "Runway ML", "HeyGen", "Pika Labs", "ElevenLabs", "Murf",
            "GitHub Copilot", "Cursor", "Replit AI", "Tabnine",
            "Tableau AI", "Polymer", "Julius AI", "Notion AI"
        ];
        
        let tools = defaultToolsList.map(name => ({
            name: name,
            clicks: toolsClicks[name] || 0
        }));

        function renderAdminPanel() {
            const container = document.getElementById("adminContainer");
            const totalClicks = tools.reduce((sum, t) => sum + t.clicks, 0);
            
            container.innerHTML = `
                <div class="admin-header">
                    <h1>لوحة تحكم المشرف <span class="gold">${currentUser.name}</span></h1>
                    <p><span class="admin-badge"><i class="fas fa-crown"></i> صلاحيات كاملة</span></p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div class="number">${users.length}</div>
                        <div>إجمالي المستخدمين</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-tools"></i>
                        <div class="number">${tools.length}</div>
                        <div>إجمالي الأدوات</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-mouse-pointer"></i>
                        <div class="number">${totalClicks}</div>
                        <div>إجمالي النقرات</div>
                    </div>
                </div>

                <h2 class="section-title"><i class="fas fa-users"></i> إدارة المستخدمين</h2>
                <div class="users-table">
                    <table>
                        <thead>
                            <tr><th>الاسم</th><th>البريد الإلكتروني</th><th>الدور</th><th>تاريخ التسجيل</th><th>إجراء</th></tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>

                <h2 class="section-title"><i class="fas fa-chart-bar"></i> إحصائيات الأدوات (الأكثر نقراً)</h2>
                <div class="tools-table">
                    <table>
                        <thead>
                            <tr><th>الأداة</th><th>عدد النقرات</th><th>إجراء</th></tr>
                        </thead>
                        <tbody id="toolsTableBody"></tbody>
                    </table>
                </div>

                <h2 class="section-title"><i class="fas fa-plus"></i> إضافة أداة جديدة</h2>
                <div class="add-tool-form">
                    <input type="text" id="newToolName" placeholder="اسم الأداة">
                    <input type="text" id="newToolCategory" placeholder="الفئة">
                    <input type="text" id="newToolUrl" placeholder="رابط الأداة">
                    <input type="text" id="newToolDesc" placeholder="وصف قصير">
                    <button id="addToolBtn"><i class="fas fa-plus"></i> إضافة أداة</button>
                </div>
                <p id="addToolMsg" style="color:#D4AF37; margin-top:10px;"></p>
            `;
            
            const usersBody = document.getElementById("usersTableBody");
            usersBody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.role === 'admin' ? '<span class="admin-badge">مدير</span>' : 'مستخدم'}</td>
                    <td>${new Date(user.createdAt || Date.now()).toLocaleDateString('ar-EG')}</td>
                    <td>${user.id !== currentUser.id ? `<button class="delete-user-btn" data-id="${user.id}">حذف</button>` : 'أنت'}</td>
                </tr>
            `).join('');
            
            document.querySelectorAll(".delete-user-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const userId = parseInt(btn.getAttribute("data-id"));
                    if (confirm("هل أنت متأكد من حذف هذا المستخدم؟")) {
                        users = users.filter(u => u.id !== userId);
                        localStorage.setItem("users", JSON.stringify(users));
                        localStorage.removeItem(`userClicks_${userId}`);
                        localStorage.removeItem(`favorites_${userId}`);
                        renderAdminPanel();
                    }
                });
            });
            
            const sortedTools = [...tools].sort((a, b) => b.clicks - a.clicks);
            const toolsBody = document.getElementById("toolsTableBody");
            toolsBody.innerHTML = sortedTools.map(tool => `
                <tr>
                    <td>${tool.name}</td>
                    <td>${tool.clicks}</td>
                    <td><button class="delete-tool-btn" data-tool="${tool.name}">حذف</button></td>
                </tr>
            `).join('');
            
            document.querySelectorAll(".delete-tool-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const toolName = btn.getAttribute("data-tool");
                    if (confirm(`هل أنت متأكد من حذف أداة ${toolName}؟`)) {
                        tools = tools.filter(t => t.name !== toolName);
                        const newClicks = {};
                        tools.forEach(t => { newClicks[t.name] = t.clicks; });
                        localStorage.setItem("toolsClicks", JSON.stringify(newClicks));
                        renderAdminPanel();
                    }
                });
            });
            
            document.getElementById("addToolBtn").addEventListener("click", () => {
                const name = document.getElementById("newToolName").value;
                const category = document.getElementById("newToolCategory").value;
                const url = document.getElementById("newToolUrl").value;
                const desc = document.getElementById("newToolDesc").value;
                const msg = document.getElementById("addToolMsg");
                
                if (!name || !category || !url) {
                    msg.textContent = "الرجاء ملء جميع الحقول";
                    msg.style.color = "#ff6b6b";
                    return;
                }
                
                if (tools.find(t => t.name === name)) {
                    msg.textContent = "هذه الأداة موجودة بالفعل";
                    msg.style.color = "#ff6b6b";
                    return;
                }
                
                tools.push({ name, category, url, description: desc, icon: "fa-cog", clicks: 0 });
                const newClicks = {};
                tools.forEach(t => { newClicks[t.name] = t.clicks; });
                localStorage.setItem("toolsClicks", JSON.stringify(newClicks));
                
                msg.textContent = `✅ تم إضافة أداة ${name} بنجاح`;
                msg.style.color = "#51cf66";
                
                document.getElementById("newToolName").value = "";
                document.getElementById("newToolCategory").value = "";
                document.getElementById("newToolUrl").value = "";
                document.getElementById("newToolDesc").value = "";
                
                setTimeout(() => { renderAdminPanel(); }, 1000);
            });
        }
        
        function setupLogout() {
            const logoutBtn = document.getElementById("logoutBtn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    localStorage.removeItem("currentUser");
                    window.location.href = "index.html";
                });
            }
        }
        
        function setupMobileMenu() {
            const toggle = document.getElementById("mobileMenu");
            const navLinks = document.getElementById("navLinks");
            if (toggle && navLinks) {
                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                });
            }
        }
        
        renderAdminPanel();
        setupLogout();
        setupMobileMenu();
    </script>
</body>
</html>
