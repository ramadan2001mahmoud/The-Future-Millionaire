
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرف | The Future Millionaire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 20px;
        }
        .admin-header {
            background: linear-gradient(135deg, #1A1A1A, #0A0A0A);
            border: 1px solid #D4AF37;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-card i { font-size: 2rem; color: #D4AF37; }
        .stat-card .number { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        .section-title {
            font-size: 1.5rem;
            margin: 30px 0 20px;
            color: #D4AF37;
            border-right: 3px solid #D4AF37;
            padding-right: 15px;
        }
        .users-table, .tools-table {
            width: 100%;
            background: #1A1A1A;
            border-radius: 15px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #2A2A2A;
        }
        th { background: #0A0A0A; color: #D4AF37; }
        .delete-user-btn, .delete-tool-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .add-tool-form {
            background: #1A1A1A;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .add-tool-form input, .add-tool-form select {
            padding: 10px;
            margin: 5px;
            background: #0A0A0A;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }
        .add-tool-form button {
            background: #D4AF37;
            color: #0A0A0A;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .admin-badge {
            background: #D4AF37;
            color: #0A0A0A;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
    </style>
