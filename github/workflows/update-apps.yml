name: تحديث بيانات التطبيقات

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-apps:
    runs-on: ubuntu-latest
    
    steps:
      - name: نسخ المستودع
        uses: actions/checkout@v4
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: تثبيت الاعتماديات
        run: npm install google-play-scraper
      
      - name: تشغيل سكريبت جلب البيانات
        run: node scripts/fetch-apps.js
      
      - name: رفع التغييرات
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: data
          target-folder: data
          branch: main
          commit-message: "🤖 تحديث تلقائي لبيانات التطبيقات"
