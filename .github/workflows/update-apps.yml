name: تحديث بيانات التطبيقات

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  actions: write

jobs:
  update-apps:
    runs-on: ubuntu-latest
    
    steps:
      - name: نسخ المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: تثبيت الاعتماديات
        run: npm install google-play-scraper
      
      - name: تشغيل سكريبت جلب البيانات
        run: node scripts/fetch-apps.js
      
      - name: إعداد Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: رفع التغييرات
        run: |
          git add data/apps-data-complete.js
          git commit -m "🤖 تحديث تلقائي لبيانات التطبيقات" || echo "No changes to commit"
          git push
